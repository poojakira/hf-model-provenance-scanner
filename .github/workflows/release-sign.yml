name: release-sign

# Publishes verifiable install integrity material on every tagged release:
#   - SHA256SUMS for install.sh / install.ps1 (+ build artifacts)
#   - Keyless (Sigstore) cosign signatures + certificates for each file
# Consumers verify with:
#   cosign verify-blob --certificate install.sh.pem --signature install.sh.sig \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     --certificate-identity-regexp '^https://github.com/poojakira/hf-model-provenance-scanner' \
#     install.sh
# or simply:  sha256sum -c SHA256SUMS

on:
  release:
    types: [published]
  push:
    tags: ["v*"]

permissions:
  contents: write     # upload release assets
  id-token: write     # keyless cosign signing via OIDC

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Generate SHA-256 checksums
        run: |
          set -euo pipefail
          files="install.sh install.ps1 $(ls dist/* 2>/dev/null || true)"
          sha256sum $files > SHA256SUMS
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign-sign (keyless) each artifact
        run: |
          set -euo pipefail
          for f in install.sh install.ps1 SHA256SUMS $(ls dist/* 2>/dev/null || true); do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done

      - name: Attach signed assets to the release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            install.ps1
            SHA256SUMS
            *.sig
            *.pem
            dist/*
