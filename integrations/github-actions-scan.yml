# Ready-to-use GitHub Actions workflow — copy to your repo's .github/workflows/
name: Model Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # For SARIF upload
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.11'

      - name: Install HF Scanner
        run: |
          git clone --depth 1 https://github.com/poojakira/hf-model-provenance-scanner.git /tmp/hf-scanner
          pip install -e /tmp/hf-scanner

      - name: Scan repository
        run: |
          hf-scanner . --mode local --format sarif --output results.sarif --fail-on high --sandbox

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
